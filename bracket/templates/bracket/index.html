<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 Bracket</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  {% load static %}
  <link rel="stylesheet" href="{% static 'bracket/css/bracket.css' %}">
</head>
<body class="bracket-page">
  <div class="container-fluid py-3 px-2 px-lg-4">
    <header class="text-center mb-3">
      <h1 class="display-5 fw-bold text-uppercase mb-1">World Cup 2026</h1>
      <p class="text-muted mb-3">Pick your winners — tap a team to advance through the knockout bracket</p>
      <div class="d-flex flex-wrap justify-content-center gap-2 mb-3">
        <button type="button" class="btn btn-outline-secondary btn-sm" id="btn-reset">Reset Bracket</button>
        <button type="button" class="btn btn-outline-primary btn-sm" id="btn-random">Fill Random Teams</button>
      </div>
    </header>

    <div class="round-labels d-none d-xl-flex">
      <span>Round of 32</span>
      <span>Round of 16</span>
      <span>Quarter Finals</span>
      <span>Semi Finals</span>
      <span class="round-label-center">Final</span>
      <span>Semi Finals</span>
      <span>Quarter Finals</span>
      <span>Round of 16</span>
      <span>Round of 32</span>
    </div>

    <div class="bracket-scroll">
      <div class="bracket" id="bracket">
        <div class="bracket-half bracket-left" id="bracket-left"></div>
        <div class="bracket-center">
          <div class="trophy-area">
            <div class="trophy-icon" aria-hidden="true">🏆</div>
          </div>
          <div class="champion-area">
            <div class="champion-label">Champions</div>
            <div class="champion-box" id="champion-display">
              <span class="champion-placeholder">?</span>
            </div>
          </div>
        </div>
        <div class="bracket-half bracket-right" id="bracket-right"></div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="teamModal" tabindex="-1" aria-labelledby="teamModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="teamModalLabel">Select Team</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="search" class="form-control mb-3" id="team-search" placeholder="Search teams…">
          <div class="list-group" id="team-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script id="teams-data" type="application/json">{{ teams_json|safe }}</script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static 'bracket/js/bracket.js' %}"></script>
</body>
</html>
